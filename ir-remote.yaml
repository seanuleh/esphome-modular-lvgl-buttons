esphome:
  name: "remote-test"
  on_boot:
    priority: -100
    then:
      - logger.log:
          format: "Remote MAC: %s"
          args:
            - get_mac_address_pretty().c_str()

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# WiFi must be initialized for ESP-NOW radio, but doesn't need to connect
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

api:
ota:
  platform: esphome

# ESP-NOW sender
espnow:
  peers:
    - "B0:CB:D8:E3:2A:C4"  # Hub MAC address

# BOOT button on GPIO9 (directly connected, active low)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    name: "Boot Button"
    id: boot_button
    on_press:
      - logger.log: "Button pressed - sending ESP-NOW"
      - espnow.send:
          address: B0:CB:D8:E3:2A:C4
          data: "AC_POWER"
          on_sent:
            - logger.log: "ESP-NOW sent successfully"
          on_error:
            - logger.log: "ESP-NOW send failed"
