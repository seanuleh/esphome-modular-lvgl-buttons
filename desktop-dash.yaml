                  - obj: { width: 24px, height: 220px, bg_color: 0xFF00FF, bg_grad_color: 0xFF00AA, bg_grad_dir: HOR, bg_opa: COVER, border_width: 0, radius: 0, pad_all: 0, clickable: true, on_press: [ { mqtt.publish: { topic: "zigbee2mqtt/Sean's Office Light/set", payload: '{"color":{"hue":310,"saturation":100}}' } }, { lvgl.widget.hide: color_picker_modal } ] }
                  - obj: { width: 24px, height: 220px, bg_color: 0xFF00AA, bg_grad_color: 0xFF0055, bg_grad_dir: HOR, bg_opa: COVER, border_width: 0, radius: 0, pad_all: 0, clickable: true, on_press: [ { mqtt.publish: { topic: "zigbee2mqtt/Sean's Office Light/set", payload: '{"color":{"hue":330,"saturation":100}}' } }, { lvgl.widget.hide: color_picker_modal } ] }
                  - obj: { width: 24px, height: 220px, bg_color: 0xFF0055, bg_grad_color: 0xFF0000, bg_grad_dir: HOR, bg_opa: COVER, border_width: 0, radius: 0, pad_all: 0, clickable: true, on_press: [ { mqtt.publish: { topic: "zigbee2mqtt/Sean's Office Light/set", payload: '{"color":{"hue":350,"saturation":100}}' } }, { lvgl.widget.hide: color_picker_modal } ] }
            - obj:
                width: 100%
                height: 44px
                radius: 22
                bg_color: 0x2A2A2A
                bg_opa: COVER
                border_width: 0
                pad_all: 0
                scrollbar_mode: "OFF"
                clickable: true
                pressed:
                  bg_color: 0x444444
                on_press:
                  - lvgl.widget.hide: color_picker_modal
                widgets:
                  - label:
                      text: "Cancel"
                      text_font: roboto14
                      text_color: 0xCCCCCC
                      align: CENTER

  pages:
    # ─────────────────────────────────────────────
    # MAIN PAGE
    # ─────────────────────────────────────────────
    - id: main_page
      layout:
        type: flex
        flex_flow: COLUMN
        flex_align_main: SPACE_EVENLY
        flex_align_cross: CENTER
      styles: page_style
      width: $screen_width
      bg_color: 0x111111
      bg_opa: cover
      pad_top: 30
      pad_bottom: 30
      pad_left: 6
      pad_right: 6
      widgets:

        # ── PC POWER ROW ──────────────────────────
        - obj:
            width: 100%
            height: 60px
            bg_opa: TRANSP
            scrollbar_mode: "OFF"
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              # SeanPC button — absolute positioned children, no nested flex
              - obj:
                  id: btn_seanpc
                  width: 184px
                  height: 56px
                  radius: 12
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 2
                  border_color: 0x22C55E
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  on_press:
                    then:
                      - lambda: |-
                          if (id(seanpc_status).state) {
                            id(seanpc_shutdown_action).execute();
                          } else {
                            id(seanpc_wake_action).execute();
                          }
                  widgets:
                    - label:
                        id: lbl_seanpc_icon
                        text: $mdi_power
                        text_font: light40
                        text_color: 0x22C55E
                        align: left_mid
                        x: 10
                    - spinner:
                        id: seanpc_spinner
                        hidden: true
                        width: 24
                        height: 24
                        align: right_mid
                        x: -16
                        spin_time: 800ms
                        arc_length: 60
                        arc_width: 3
                        arc_color: 0x333333
                        indicator:
                          arc_color: 0xCC2828
                          arc_width: 3
                    - label:
                        text: "SeanPC"
                        text_font: roboto18
                        text_color: 0xCCCCCC
                        align: left_mid
                        x: 60
                        y: -9
                    - label:
                        id: lbl_seanpc_state
                        text: "OFF"
                        text_font: roboto14
                        text_color: 0xCC2828
                        align: left_mid
                        x: 60
                        y: 12

              # Office light bulb — opens light_page
              - obj:
                  id: btn_home_bulb
                  width: 56px
                  height: 56px
                  radius: 28
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  on_press:
                    - lvgl.page.show: light_page
                  widgets:
                    - label:
                        id: lbl_home_bulb
                        text: $mdi_lightbulb
                        text_font: $icon_font_small
                        text_color: 0x555555
                        align: CENTER

              # GinaPC button — absolute positioned children, mirrored
              - obj:
                  id: btn_ginapc
                  width: 184px
                  height: 56px
                  radius: 12
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 2
                  border_color: 0xCC2828
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  on_press:
                    then:
                      - lambda: |-
                          if (id(ginapc_status).state) {
                            id(ginapc_shutdown_action).execute();
                          } else {
                            id(ginapc_wake_action).execute();
                          }
                  widgets:
                    - label:
                        id: lbl_ginapc_icon
                        text: $mdi_power
                        text_font: light40
                        text_color: 0xCC2828
                        align: right_mid
                        x: -10
                    - spinner:
                        id: ginapc_spinner
                        hidden: true
                        width: 24
                        height: 24
                        align: left_mid
                        x: 16
                        spin_time: 800ms
                        arc_length: 60
                        arc_width: 3
                        arc_color: 0x333333
                        indicator:
                          arc_color: 0xCC2828
                          arc_width: 3
                    - label:
                        text: "GinaPC"
                        text_font: roboto18
                        text_color: 0xCCCCCC
                        align: right_mid
                        x: -60
                        y: -9
                    - label:
                        id: lbl_ginapc_state
                        text: "OFF"
                        text_font: roboto14
                        text_color: 0x888888
                        align: right_mid
                        x: -60
                        y: 12

        # ── BLINDS SLIDER ─────────────────────────
        - obj:
            width: 100%
            height: 56px
            bg_color: 0x1C1C1C
            bg_opa: COVER
            radius: 10
            border_width: 1
            border_color: 0x2A2A2A
            scrollbar_mode: "OFF"
            pad_left: 14
            pad_right: 14
            layout:
              type: grid
              grid_columns: ["56px", "FR(1)", "44px"]
              grid_rows: ["100%"]
            widgets:
              - label:
                  text: "Blinds"
                  text_font: roboto14
                  text_color: 0x555555
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_x_align: START
                  grid_cell_y_align: CENTER
              - slider:
                  id: slider_btn_sean_cover_office
                  width: 100%
                  height: 10px
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: CENTER
                  bg_color: 0x2A2A2A
                  bg_opa: COVER
                  indicator:
                    bg_color: 0x555555
                    bg_grad_color: 0x999999
                    bg_grad_dir: HOR
                    bg_opa: COVER
                  knob:
                    bg_color: 0xAAAAAA
                    bg_opa: COVER
                    width: 22px
                    height: 22px
                    radius: 11
                  on_release:
                    - homeassistant.action:
                        action: cover.set_cover_position
                        data:
                          entity_id: cover.sean_s_office_blind
                          position: !lambda return int(x);
              - label:
                  id: label_btn_sean_cover_office_pos
                  text: "--%"
                  text_font: roboto14
                  text_color: 0x555555
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 2
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER

        # ── MUX TOGGLE CARDS ─────────────────────
        - obj:
            width: 100%
            height: 116px
            bg_opa: TRANSP
            scrollbar_mode: "OFF"
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER

            widgets:
              # Monitor card
              - obj:
                  id: btn_monitor_card
                  width: 148px
                  height: 112px
                  radius: 14
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: CENTER
                  on_press:
                    - mqtt.publish:
                        topic: "monitor/input/set"
                        payload: !lambda |-
                          return id(monitor_input_state).state == "pc" ? std::string("mac") : std::string("pc");
                  widgets:
                    - obj:
                        id: strip_monitor
                        width: 100%
                        height: 4px
                        radius: 2
                        bg_color: 0xCC2828
                        bg_opa: COVER
                        pad_all: 0
                    - obj:
                        width: 44px
                        height: 44px
                        radius: 22
                        bg_color: 0x111111
                        bg_opa: COVER
                        border_width: 1
                        border_color: 0x2A2A2A
                        pad_all: 0
                        widgets:
                          - label:
                              text: $mdi_monitor
                              text_font: $icon_font_small
                              text_color: 0xDDDDDD
                              align: CENTER
                    - label:
                        text: "MONITOR"
                        text_font: roboto12
                        text_color: 0x555555
                    - obj:
                        id: pill_monitor
                        width: 70px
                        height: 22px
                        radius: 11
                        bg_color: 0xCC2828
                        bg_opa: COVER
                        border_width: 0
                        pad_all: 0
                        widgets:
                          - label:
                              id: lbl_monitor_state
                              text: "PC"
                              text_font: roboto12
                              text_color: 0xFFFFFF
                              align: CENTER

              # USB card
              - obj:
                  id: btn_usb_card
                  width: 148px
                  height: 112px
                  radius: 14
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: CENTER
                  on_press:
                    - mqtt.publish:
                        topic: "usb_switch/device/set"
                        payload: !lambda |-
                          return id(usbswitch_output_state).state == "pc" ? std::string("mac") : std::string("pc");
                  widgets:
                    - obj:
                        id: strip_usb
                        width: 100%
                        height: 4px
                        radius: 2
                        bg_color: 0xCC2828
                        bg_opa: COVER
                        pad_all: 0
                    - obj:
                        width: 44px
                        height: 44px
                        radius: 22
                        bg_color: 0x111111
                        bg_opa: COVER
                        border_width: 1
                        border_color: 0x2A2A2A
                        pad_all: 0
                        widgets:
                          - label:
                              text: $mdi_usb
                              text_font: $icon_font_small
                              text_color: 0xDDDDDD
                              align: CENTER
                    - label:
                        text: "USB"
                        text_font: roboto12
                        text_color: 0x555555
                    - obj:
                        id: pill_usb
                        width: 70px
                        height: 22px
                        radius: 11
                        bg_color: 0xCC2828
                        bg_opa: COVER
                        border_width: 0
                        pad_all: 0
                        widgets:
                          - label:
                              id: lbl_usb_state
                              text: "PC"
                              text_font: roboto12
                              text_color: 0xFFFFFF
                              align: CENTER

              # KVM card
              - obj:
                  id: btn_kvm_card
                  width: 148px
                  height: 112px
                  radius: 14
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: START
                    flex_align_cross: CENTER
                  on_press:
                    - mqtt.publish:
                        topic: "monitor/kvm_usb/set"
                        payload: !lambda |-
                          return id(kvm_input_state).state == "pc" ? std::string("mac") : std::string("pc");
                  widgets:
                    - obj:
                        id: strip_kvm
                        width: 100%
                        height: 4px
                        radius: 2
                        bg_color: 0x4A6ADA
                        bg_opa: COVER
                        pad_all: 0
                    - obj:
                        width: 44px
                        height: 44px
                        radius: 22
                        bg_color: 0x111111
                        bg_opa: COVER
                        border_width: 1
                        border_color: 0x2A2A2A
                        pad_all: 0
                        widgets:
                          - label:
                              text: $mdi_monitor_share
                              text_font: $icon_font_small
                              text_color: 0xDDDDDD
                              align: CENTER
                    - label:
                        text: "KVM"
                        text_font: roboto12
                        text_color: 0x555555
                    - obj:
                        id: pill_kvm
                        width: 70px
                        height: 22px
                        radius: 11
                        bg_color: 0x4A6ADA
                        bg_opa: COVER
                        border_width: 0
                        pad_all: 0
                        widgets:
                          - label:
                              id: lbl_kvm_state
                              text: "MAC"
                              text_font: roboto12
                              text_color: 0xFFFFFF
                              align: CENTER

        # ── MASTER SWITCH ─────────────────────────
        - obj:
            width: 100%
            height: 50px
            bg_opa: TRANSP
            scrollbar_mode: "OFF"
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER

            widgets:
              - button:
                  id: btn_all_pc
                  width: 228px
                  height: 48px
                  radius: 24
                  bg_color: 0xCC2828
                  bg_opa: COVER
                  shadow_width: 0
                  border_width: 0
                  pad_all: 0
                  pressed:
                    bg_color: 0xFF8866
                  on_press:
                    - mqtt.publish: { topic: "monitor/input/set",    payload: "pc" }
                    - mqtt.publish: { topic: "usb_switch/device/set", payload: "pc" }
                    - mqtt.publish: { topic: "monitor/kvm_usb/set",  payload: "pc" }
                  widgets:
                    - label:
                        text: "ALL -> PC"
                        text_font: roboto18
                        text_color: 0xFFFFFF
                        align: CENTER

              - button:
                  id: btn_all_mac
                  width: 228px
                  height: 48px
                  radius: 24
                  bg_color: 0x4A6ADA
                  bg_opa: COVER
                  shadow_width: 0
                  border_width: 0
                  pad_all: 0
                  pressed:
                    bg_color: 0x88A0FF
                  on_press:
                    - mqtt.publish: { topic: "monitor/input/set",    payload: "mac" }
                    - mqtt.publish: { topic: "usb_switch/device/set", payload: "mac" }
                    - mqtt.publish: { topic: "monitor/kvm_usb/set",  payload: "mac" }
                  widgets:
                    - label:
                        text: "ALL -> MAC"
                        text_font: roboto18
                        text_color: 0xFFFFFF
                        align: CENTER

        # ── BOTTOM ROW: DISPLAY + JIGGLER ─────────
        - obj:
            width: 100%
            height: 70px
            bg_opa: TRANSP
            scrollbar_mode: "OFF"
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER

            widgets:
              # Display mode: Dual
              - obj:
                  id: switch_to_dualscreen
                  width: 90px
                  height: 64px
                  radius: 10
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  on_press:
                    - homeassistant.service:
                        service: button.press
                        data:
                          entity_id: button.9800x3d_displaydualscreen
                  widgets:
                    - label:
                        text: $mdi_monitor_multiple
                        text_font: $icon_font_small
                        text_color: 0xDDDDDD
                        align: CENTER
                        y: -10
                    - label:
                        text: "DUAL"
                        text_font: roboto12
                        text_color: 0x888888
                        align: CENTER
                        y: 16

              # Display mode: OLED
              - obj:
                  id: switch_to_oled
                  width: 90px
                  height: 64px
                  radius: 10
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  on_press:
                    - homeassistant.service:
                        service: button.press
                        data:
                          entity_id: button.9800x3d_displayoledonly
                  widgets:
                    - label:
                        text: $mdi_monitor_small
                        text_font: $icon_font_small
                        text_color: 0xDDDDDD
                        align: CENTER
                        y: -10
                    - label:
                        text: "OLED"
                        text_font: roboto12
                        text_color: 0x888888
                        align: CENTER
                        y: 16

              # Display mode: Ultrawide
              - obj:
                  id: switch_to_ultrawide
                  width: 90px
                  height: 64px
                  radius: 10
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  on_press:
                    - homeassistant.service:
                        service: button.press
                        data:
                          entity_id: button.9800x3d_displayultrawideonly
                  widgets:
                    - label:
                        text: $mdi_monitor
                        text_font: $icon_font_small
                        text_color: 0xDDDDDD
                        align: CENTER
                        y: -10
                    - label:
                        text: "ULTRA"
                        text_font: roboto12
                        text_color: 0x888888
                        align: CENTER
                        y: 16

              # Mouse Jiggler
              - obj:
                  id: btn_jiggler
                  width: 96px
                  height: 64px
                  radius: 10
                  bg_color: 0x1A1A1A
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  clickable: true
                  pressed:
                    bg_color: 0x2E2E2E
                  on_press:
                    - script.execute: jiggler_toggle_action
                  widgets:
                    - label:
                        id: lbl_jiggler_icon
                        text: $mdi_mouse
                        text_font: $icon_font_small
                        text_color: 0xDDDDDD
                        align: top_mid
                        y: 4
                    - obj:
                        width: 44px
                        height: 14px
                        radius: 7
                        id: jiggler_track
                        bg_color: 0x2A2A2A
                        bg_opa: COVER
                        border_width: 0
                        pad_all: 0
                        align: CENTER
                        widgets:
                          - obj:
                              id: jiggler_handle
                              width: 12px
                              height: 12px
                              radius: 6
                              bg_color: 0x888888
                              bg_opa: COVER
                              border_width: 0
                              align: left_mid
                              x: 1
                              y: 0
                    - label:
                        id: lbl_jiggler_state
                        text: "OFF"
                        text_font: roboto12
                        text_color: 0x888888
                        align: bottom_mid
                        y: -4

    # ─────────────────────────────────────────────
    # LIGHT PAGE
    # ─────────────────────────────────────────────
    - id: light_page
      layout:
        type: flex
        flex_flow: COLUMN
        flex_align_main: SPACE_EVENLY
        flex_align_cross: CENTER
      styles: page_style
      width: $screen_width
      bg_color: 0x111111
      bg_opa: cover
      pad_top: 36
      pad_bottom: 42
      pad_left: 16
      pad_right: 16
      widgets:

        # Title
        - label:
            text: "OFFICE LIGHT"
            text_font: roboto14
            text_color: 0x666666
            width: 100%
            text_align: CENTER

        # Big toggle button
        - obj:
            id: btn_light_toggle
            width: 100%
            height: 100px
            radius: 20
            bg_color: 0x1A1A1A
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            scrollbar_mode: "OFF"
            clickable: true
            pressed:
              bg_color: 0x2E2E2E
            on_press:
              - script.execute: light_toggle_action
            widgets:
              - label:
                  id: lbl_light_big_bulb
                  text: $mdi_lightbulb
                  text_font: light40
                  text_color: 0x444444
                  align: CENTER
                  y: -18
              - label:
                  id: lbl_light_state
                  text: "OFF"
                  text_font: roboto24
                  text_color: 0x666666
                  align: CENTER
                  y: 32

        # Brightness row
        - obj:
            width: 100%
            height: 56px
            bg_color: 0x1C1C1C
            bg_opa: COVER
            radius: 10
            border_width: 0
            pad_left: 14
            pad_right: 14
            scrollbar_mode: "OFF"
            layout:
              type: grid
              grid_columns: ["32px", "FR(1)"]
              grid_rows: ["100%"]
            widgets:
              - label:
                  text: $mdi_brightness_6
                  text_font: $icon_font_small
                  text_color: 0xDDDDDD
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              - slider:
                  id: slider_brightness
                  min_value: 1
                  max_value: 254
                  value: 127
                  width: 100%
                  height: 10px
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: CENTER
                  bg_color: 0x2A2A2A
                  bg_opa: COVER
                  indicator:
                    bg_color: 0x664422
                    bg_grad_color: 0xFFC04C
                    bg_grad_dir: HOR
                    bg_opa: COVER
                  knob:
                    bg_color: 0xFFC04C
                    bg_opa: COVER
                    width: 22px
                    height: 22px
                    radius: 11
                  on_release:
                    - mqtt.publish:
                        topic: "zigbee2mqtt/Sean's Office Light/set"
                        payload: !lambda |-
                          char buf[64];
                          snprintf(buf, sizeof(buf), "{\"brightness\":%d}", (int)x);
                          return std::string(buf);

        # Color temp row
        - obj:
            width: 100%
            height: 56px
            bg_color: 0x1C1C1C
            bg_opa: COVER
            radius: 10
            border_width: 0
            pad_left: 14
            pad_right: 14
            scrollbar_mode: "OFF"
            layout:
              type: grid
              grid_columns: ["32px", "FR(1)"]
              grid_rows: ["100%"]
            widgets:
              - label:
                  text: $mdi_white_balance_sunny
                  text_font: $icon_font_small
                  text_color: 0xDDDDDD
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_x_align: CENTER
                  grid_cell_y_align: CENTER
              - slider:
                  id: slider_colortemp
                  min_value: 153
                  max_value: 500
                  value: 300
                  width: 100%
                  height: 10px
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: CENTER
                  bg_color: 0x2A2A2A
                  bg_opa: COVER
                  indicator:
                    bg_color: 0xAACCFF
                    bg_grad_color: 0xFFAA55
                    bg_grad_dir: HOR
                    bg_opa: COVER
                  knob:
                    bg_color: 0xEEEEEE
                    bg_opa: COVER
                    width: 22px
                    height: 22px
                    radius: 11
                  on_release:
                    - mqtt.publish:
                        topic: "zigbee2mqtt/Sean's Office Light/set"
                        payload: !lambda |-
                          char buf[64];
                          snprintf(buf, sizeof(buf), "{\"color_temp\":%d}", (int)x);
                          return std::string(buf);

