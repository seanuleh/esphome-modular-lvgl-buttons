                  - obj: { width: 24px, height: 220px, bg_color: 0x5500FF, bg_grad_color: 0xAA00FF, bg_grad_dir: HOR, bg_opa: COVER, border_width: 0, radius: 0, pad_all: 0, clickable: true, on_press: [ { mqtt.publish: { topic: "zigbee2mqtt/Sean's Office Light/set", payload: '{"color":{"hue":270,"saturation":100}}' } }, { lvgl.widget.hide: color_picker_modal } ] }
