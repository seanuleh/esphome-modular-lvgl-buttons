substitutions:
  <<: !include modules/base/mdi_glyph_substitutions.yaml
  lightbulb:         "\U000F0335"
  ceiling_light:     "\U000F0769"
  lamp:              "\U000F06B5"
  floor_lamp:        "\U000F08DD"
  string_lights:     "\U000F12BA"
  track_light:       "\U000F0914"
  bulkhead_light:    "\U000F1A2F"
  led_strip:         "\U000F07D6"
  coach_lamp:        "\U000F1020"
  ceiling_fan_light: "\U000F1798"
  bed:               "\U000F02E3"

  # Charcoal theme
  bg_color: charcoal_deep
  icon_font: light40
  icon_font_small: light24
  text_font: roboto24
  text_font_small: roboto18
  text_color: "0xEEEEEE"
  button_on_color: accent_crimson
  button_off_color: charcoal
  icon_on_color: "0xEEEEEE"
  icon_off_color: "0x555555"
  label_on_color: "0xEEEEEE"
  label_off_color: "0x777777"
  button_text_color: "0xEEEEEE"

  button_height_single: '135px'
  button_height_double: '270px'
  button_width: '151px'
  touchscreen_idle_timeout: "30s"
  touchscreen_daytime_brightness: "100%"
  touchscreen_nighttime_brightness: "50%"
  boot_screen_delay: 5s
  header_height: 30px
  footer_height: 30px
  screen_night_hour: '0'
  screen_night_minute: '0'
  screen_day_hour: '5'
  screen_day_minute: '30'
  screen_height: '480px'
  screen_width: '480px'
  sdl_height: '480'
  sdl_width: '480'

esphome:
  name: "desktop-dash"
  friendly_name: "desktop-dash"
  comment: "Sean Bedroom Desktop Dash"

api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus
          - delay: 2s
          - script.execute: update_seanpc_display
          - script.execute: update_ginapc_display
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus

mqtt:
  broker: 192.168.1.99
  on_message:
    - topic: monitor/input/state
      then:
        - text_sensor.template.publish:
            id: monitor_input_state
            state: !lambda 'return x;'
    - topic: monitor/kvm_usb/state
      then:
        - text_sensor.template.publish:
            id: kvm_input_state
            state: !lambda 'return x;'
    - topic: usb_switch/device/state
      then:
        - text_sensor.template.publish:
            id: usbswitch_output_state
            state: !lambda 'return x;'
    - topic: "zigbee2mqtt/Sean's Office Light"
      then:
        - lambda: |-
            json::parse_json(x, [](JsonObject root) -> bool {
              if (root["state"].is<const char *>()) {
                id(light_on) = (strcmp(root["state"].as<const char *>(), "ON") == 0);
              }
              if (root["brightness"].is<int>()) {
                id(light_brightness) = root["brightness"].as<int>();
              }
              if (root["color_temp"].is<int>()) {
                id(light_colortemp) = root["color_temp"].as<int>();
              }
              return true;
            });
        - script.execute: update_light_display

globals:
  - id: seanpc_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ginapc_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: jiggler_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: light_on
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: light_brightness
    type: int
    restore_value: no
    initial_value: '127'
  - id: light_colortemp
    type: int
    restore_value: no
    initial_value: '300'

binary_sensor:
  - platform: homeassistant
    id: seanpc_status
    entity_id: binary_sensor.seanpc_status
    on_state:
      then:
        - globals.set:
            id: seanpc_pending
            value: 'false'
        - lvgl.widget.hide: seanpc_spinner
        - script.execute: update_seanpc_display
  - platform: homeassistant
    id: ginapc_status
    entity_id: binary_sensor.ginapc_status
    on_state:
      then:
        - globals.set:
            id: ginapc_pending
            value: 'false'
        - lvgl.widget.hide: ginapc_spinner
        - script.execute: update_ginapc_display

text_sensor:
  - platform: template
    name: "Monitor Input State"
    id: monitor_input_state
    internal: true
    on_value:
      - lambda: |-
          bool is_pc = (x == "pc");
          lv_color_t col = is_pc ? lv_color_hex(0xCC2828) : lv_color_hex(0x4A6ADA);
          lv_obj_set_style_bg_color(id(pill_monitor), col, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(strip_monitor), col, LV_PART_MAIN);
          lv_label_set_text(id(lbl_monitor_state), is_pc ? "PC" : "MAC");
  - platform: template
    name: "KVM Input State"
    id: kvm_input_state
    internal: true
    on_value:
      - lambda: |-
          bool is_pc = (x == "pc");
          lv_color_t col = is_pc ? lv_color_hex(0xCC2828) : lv_color_hex(0x4A6ADA);
          lv_obj_set_style_bg_color(id(pill_kvm), col, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(strip_kvm), col, LV_PART_MAIN);
          lv_label_set_text(id(lbl_kvm_state), is_pc ? "PC" : "MAC");
  - platform: template
    name: "USB Switch Output State"
    id: usbswitch_output_state
    internal: true
    on_value:
      - lambda: |-
          bool is_pc = (x == "pc");
          lv_color_t col = is_pc ? lv_color_hex(0xCC2828) : lv_color_hex(0x4A6ADA);
          lv_obj_set_style_bg_color(id(pill_usb), col, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(strip_usb), col, LV_PART_MAIN);
          lv_label_set_text(id(lbl_usb_state), is_pc ? "PC" : "MAC");

time:
  - platform: sntp
    id: sntp_time
    timezone: Australia/Melbourne
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time_hr
          text: !lambda |-
            static char hr_buf[4];
            auto now = id(sntp_time).now();
            int h = now.hour % 12;
            if (h == 0) h = 12;
            snprintf(hr_buf, sizeof(hr_buf), "%d", h);
            return hr_buf;
      - lvgl.label.update:
          id: display_time_min
          text: !lambda |-
            static char min_buf[8];
            auto now = id(sntp_time).now();
            snprintf(min_buf, sizeof(min_buf), ":%02d%s", now.minute, now.hour >= 12 ? "pm" : "am");
            return min_buf;

  - id: update_seanpc_display
    then:
      - lambda: |-
          bool on = id(seanpc_status).state;
          lv_color_t col = on ? lv_color_hex(0x22C55E) : lv_color_hex(0xCC2828);
          lv_obj_set_style_border_color(id(btn_seanpc), col, LV_PART_MAIN);
          lv_label_set_text(id(lbl_seanpc_state), on ? "ON" : "OFF");
          lv_obj_set_style_text_color(id(lbl_seanpc_state), col, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_seanpc_icon), col, LV_PART_MAIN);

  - id: update_ginapc_display
    then:
      - lambda: |-
          bool on = id(ginapc_status).state;
          lv_color_t col = on ? lv_color_hex(0x22C55E) : lv_color_hex(0xCC2828);
          lv_obj_set_style_border_color(id(btn_ginapc), col, LV_PART_MAIN);
          lv_label_set_text(id(lbl_ginapc_state), on ? "ON" : "OFF");
          lv_obj_set_style_text_color(id(lbl_ginapc_state), col, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_ginapc_icon), col, LV_PART_MAIN);

  - id: seanpc_wake_action
    then:
      - globals.set:
          id: seanpc_pending
          value: 'true'
      - lvgl.widget.show: seanpc_spinner
      - homeassistant.service:
          service: rest_command.upsnap_wake
          data:
            device_id: "ihbgmfc7e5v83gj"
      - delay: 30s
      - if:
          condition:
            lambda: 'return id(seanpc_pending);'
          then:
            - lvgl.widget.hide: seanpc_spinner
            - globals.set:
                id: seanpc_pending
                value: 'false'

  - id: seanpc_shutdown_action
    then:
      - globals.set:
          id: seanpc_pending
          value: 'true'
      - lvgl.widget.show: seanpc_spinner
      - homeassistant.service:
          service: rest_command.upsnap_shutdown
          data:
            device_id: "ihbgmfc7e5v83gj"
      - delay: 30s
      - if:
          condition:
            lambda: 'return id(seanpc_pending);'
          then:
            - lvgl.widget.hide: seanpc_spinner
            - globals.set:
                id: seanpc_pending
                value: 'false'

  - id: ginapc_wake_action
    then:
      - globals.set:
          id: ginapc_pending
          value: 'true'
      - lvgl.widget.show: ginapc_spinner
      - homeassistant.service:
          service: rest_command.upsnap_wake
          data:
            device_id: "09edkzf2x5h5e9i"
      - delay: 30s
      - if:
          condition:
            lambda: 'return id(ginapc_pending);'
          then:
            - lvgl.widget.hide: ginapc_spinner
            - globals.set:
                id: ginapc_pending
                value: 'false'

  - id: ginapc_shutdown_action
    then:
      - globals.set:
          id: ginapc_pending
          value: 'true'
      - lvgl.widget.show: ginapc_spinner
      - homeassistant.service:
          service: rest_command.upsnap_shutdown
          data:
            device_id: "09edkzf2x5h5e9i"
      - delay: 30s
      - if:
          condition:
            lambda: 'return id(ginapc_pending);'
          then:
            - lvgl.widget.hide: ginapc_spinner
            - globals.set:
                id: ginapc_pending
                value: 'false'

  - id: update_light_display
    then:
      - lambda: |-
          bool on = id(light_on);
          lv_color_t bulb_col = on ? lv_color_hex(0xFFC04C) : lv_color_hex(0x555555);
          lv_color_t bg_col   = on ? lv_color_hex(0x3A2A10) : lv_color_hex(0x1A1A1A);
          lv_obj_set_style_text_color(id(lbl_home_bulb), bulb_col, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(btn_home_bulb), bg_col, LV_PART_MAIN);
          lv_label_set_text(id(lbl_light_state), on ? "ON" : "OFF");
          lv_obj_set_style_text_color(id(lbl_light_state), on ? lv_color_hex(0xFFC04C) : lv_color_hex(0x666666), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_light_big_bulb), on ? lv_color_hex(0xFFC04C) : lv_color_hex(0x444444), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(btn_light_toggle), on ? lv_color_hex(0x3A2A10) : lv_color_hex(0x1A1A1A), LV_PART_MAIN);
          lv_slider_set_value(id(slider_brightness), id(light_brightness), LV_ANIM_OFF);
          lv_slider_set_value(id(slider_colortemp), id(light_colortemp), LV_ANIM_OFF);

  - id: light_toggle_action
    then:
      - mqtt.publish:
          topic: "zigbee2mqtt/Sean's Office Light/set"
          payload: !lambda 'return id(light_on) ? std::string("{\"state\":\"OFF\"}") : std::string("{\"state\":\"ON\"}");'

  - id: jiggler_toggle_action
    then:
      - lambda: |-
          id(jiggler_active) = !id(jiggler_active);
          bool on = id(jiggler_active);
          lv_color_t on_col  = lv_color_hex(0x22C55E);
          lv_color_t off_col = lv_color_hex(0x2A2A2A);
          lv_color_t txt_on  = lv_color_hex(0xEEEEEE);
          lv_color_t txt_off = lv_color_hex(0x888888);
          lv_color_t icon_off = lv_color_hex(0xDDDDDD);
          lv_obj_set_style_bg_color(id(jiggler_track), on ? on_col : off_col, LV_PART_MAIN);
          lv_obj_set_x(id(jiggler_handle), on ? 31 : 1);
          lv_label_set_text(id(lbl_jiggler_state), on ? "ON" : "OFF");
          lv_obj_set_style_text_color(id(lbl_jiggler_state), on ? txt_on : txt_off, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_jiggler_icon), on ? on_col : icon_off, LV_PART_MAIN);
      - mqtt.publish:
          topic: "seans_jiggler/switch/command"
          payload: !lambda 'return id(jiggler_active) ? std::string("ON") : std::string("OFF");'

packages:
  wifi: !include
    file: modules/base/wifi.yaml
    vars:
      use_address: 192.168.1.61
  base: !include modules/base/base.yaml
  touchscreen: !include modules/base/touchscreen.yaml
  backlight: !include modules/base/backlignt.yaml
  colors: !include modules/base/color.yaml
  fonts: !include modules/base/fonts.yaml
  images: !include modules/base/images.yaml
  sensors: !include modules/sensors/sensors_base.yaml
  theme_style: !include modules/base/theme_style.yaml
  hardware: !include modules/hardware/guition-esp32-s3-4848s040.yaml

  btn_sean_cover_office: !include
    file: modules/sensors/cover_state.yaml
    vars:
      uid: btn_sean_cover_office
      entity_id: cover.sean_s_office_blind

lvgl:
  rotation: 270
  # Custom inlined top_layer for two-tone time display
  top_layer:
    widgets:
      - obj:
          align: top_mid
          width: 100%
          height: $header_height
          bg_color: 0x0C0C0C
          bg_opa: COVER
          border_width: 0
          radius: 0
          pad_all: 0
          widgets:
            - label:
                id: display_time_hr
                text: "0"
                text_font: roboto18
                text_color: 0xEEEEEE
                align: left_mid
                x: 12
                width: 28
                text_align: RIGHT
            - label:
                id: display_time_min
                text: ":00am"
                text_font: roboto18
                text_color: 0xEEEEEE
                align: left_mid
                x: 42
            - label:
                text: "OFFICE"
                text_font: roboto14
                text_color: 0x444444
                align: CENTER
            - label:
                id: lbl_hastatus
                hidden: true
                align: right_mid
                x: -10
                text: ""
                text_color: 0x22C55E
      - buttonmatrix:
          align: bottom_mid
          width: 100%
          height: $footer_height
          bg_color: 0x0A0A0A
          bg_grad_color: 0x0A0A0A
          bg_grad_dir: NONE
          bg_opa: COVER
          border_width: 0
          radius: 0
          pad_all: 0
          items:
            bg_color: 0x0A0A0A
            bg_grad_color: 0x0A0A0A
            bg_opa: COVER
            border_width: 0
            text_color: 0x444444
            radius: 0
          rows:
            - buttons:
              - id: page_prev
                text: ""
                on_press:
                  then:
                    lvgl.page.previous:
              - id: page_home
                text: ""
                on_press:
                  then:
                    lvgl.page.show: main_page
              - id: page_next
                text: ""
                on_press:
                  then:
                    lvgl.page.next:
      # Color picker modal — hidden by default, overlays everything
      - obj:
          id: color_picker_modal
          hidden: true
          width: 100%
          height: 100%
          align: CENTER
          bg_color: 0x000000
          bg_opa: COVER
          border_width: 0
          radius: 0
          pad_top: 60
          pad_bottom: 60
          pad_left: 24
          pad_right: 24
          scrollbar_mode: "OFF"
          layout:
            type: flex
            flex_flow: COLUMN
            flex_align_main: SPACE_EVENLY
            flex_align_cross: CENTER
          widgets:
            - label:
                text: "PICK A COLOR"
                text_font: roboto14
                text_color: 0xCCCCCC
                width: 100%
                text_align: CENTER
            # Continuous rainbow gradient bar — 18 segments × 20° hue each
            - obj:
                width: 432px
                height: 220px
                bg_opa: TRANSP
                border_width: 0
                radius: 0
                pad_all: 0
                scrollbar_mode: "OFF"
                clip_corner: true
                layout:
                  type: flex
                  flex_flow: ROW
                  pad_column: 0
                  pad_row: 0
                widgets:
                  - obj: { width: 24px, height: 220px, bg_color: 0xFF0000, bg_grad_color: 0xFF5500, bg_grad_dir: HOR, bg_opa: COVER, border_width: 0, radius: 0, pad_all: 0, clickable: true, on_press: [ { mqtt.publish: { topic: "zigbee2mqtt/Sean's Office Light/set", payload: '{"color":{"hue":10,"saturation":100}}' } }, { lvgl.widget.hide: color_picker_modal } ] }
