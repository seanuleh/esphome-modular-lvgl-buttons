<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <style>text { font-family: 'SF Mono', 'Consolas', 'Courier New', monospace; }</style>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="navyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2E"/>
      <stop offset="100%" stop-color="#091525"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121F33"/>
      <stop offset="100%" stop-color="#0E1929"/>
    </linearGradient>
    <linearGradient id="activePC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="activeMAC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" fill="url(#navyBg)"/>

  <!-- ── HEADER ── -->
  <rect width="480" height="28" fill="#0A1525"/>
  <rect x="0" y="27" width="480" height="1" fill="#1A2E44"/>
  <text x="20" y="19" font-size="12" fill="#4A6A8A">9:42am</text>
  <text x="240" y="19" text-anchor="middle" font-size="11" fill="#7AA8CC" letter-spacing="3">OFFICE</text>
  <circle cx="452" cy="14" r="5" fill="#22C55E"/>
  <text x="462" y="19" font-size="10" fill="#22C55E">HA</text>

  <!-- ── BLINDS SECTION ── -->
  <rect x="0" y="28" width="480" height="62" fill="#0C1826"/>
  <rect x="16" y="40" width="22" height="2" rx="1" fill="#2A4A6A"/>
  <rect x="16" y="46" width="22" height="2" rx="1" fill="#2A4A6A"/>
  <rect x="16" y="52" width="22" height="2" rx="1" fill="#2A4A6A"/>
  <rect x="16" y="58" width="22" height="2" rx="1" fill="#2A4A6A"/>
  <rect x="16" y="64" width="22" height="2" rx="1" fill="#2A4A6A"/>
  <text x="50" y="60" font-size="12" fill="#4A6A8A">Blinds</text>
  <rect x="112" y="54" width="296" height="5" rx="2.5" fill="#152030"/>
  <rect x="112" y="54" width="148" height="5" rx="2.5" fill="#2A4A6A"/>
  <circle cx="260" cy="56" r="9" fill="#3A6A9A" stroke="#5A8ABA" stroke-width="1"/>
  <rect x="420" y="46" width="50" height="22" rx="4" fill="#0E1E30" stroke="#1A2E44"/>
  <text x="445" y="61" text-anchor="middle" font-size="10" fill="#4A6A8A">OPEN</text>
  <rect x="0" y="89" width="480" height="1" fill="#1A2E44"/>

  <!-- ── PC POWER SECTION ── -->
  <rect x="0" y="90" width="480" height="70" fill="#0A1525"/>

  <!-- SeanPC (on) -->
  <circle cx="34" cy="125" r="16" fill="#0B1E10" stroke="#22C55E" stroke-width="2"/>
  <line x1="34" y1="109" x2="34" y2="118" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 25 115 A 12 12 0 1 0 43 115" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
  <text x="62" y="120" font-size="12" fill="#A8CADF">SeanPC</text>
  <text x="62" y="136" font-size="11" fill="#22C55E">● ON</text>

  <!-- GinaPC (off) -->
  <circle cx="446" cy="125" r="16" fill="#1E0B0B" stroke="#EF4444" stroke-width="2"/>
  <line x1="446" y1="109" x2="446" y2="118" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 437 115 A 12 12 0 1 0 455 115" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <text x="393" y="120" font-size="12" fill="#A8CADF">GinaPC</text>
  <text x="390" y="136" font-size="11" fill="#EF4444">● OFF</text>

  <rect x="0" y="160" width="480" height="1" fill="#1A2E44"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- ─── MUX SECTION: MATRIX LAYOUT ─── -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Column headers (y=165–190) -->
  <rect x="8" y="165" width="464" height="26" rx="5" fill="#0A1525"/>
  <!-- PC column header -->
  <rect x="286" y="167" width="86" height="22" rx="4" fill="#1A2E44"/>
  <text x="329" y="182" text-anchor="middle" font-size="11" fill="#7AA8CC" letter-spacing="1">PC</text>
  <!-- MAC column header -->
  <rect x="380" y="167" width="88" height="22" rx="4" fill="#1A2E44"/>
  <text x="424" y="182" text-anchor="middle" font-size="11" fill="#7AA8CC" letter-spacing="1">MAC</text>

  <!-- ── ALL ROW (master) ── (y=196–250) -->
  <rect x="8" y="196" width="464" height="54" rx="8" fill="url(#cardBg)" stroke="#1E3A54"/>

  <!-- ALL label with badge -->
  <rect x="16" y="207" width="38" height="16" rx="3" fill="#1E3A5F"/>
  <text x="35" y="219" text-anchor="middle" font-size="9" fill="#5A9ACA" letter-spacing="1">ALL</text>
  <text x="66" y="215" font-size="11" fill="#4A7A9A">Switch all</text>
  <text x="66" y="229" font-size="9" fill="#2A4A6A">3 devices</text>

  <!-- PC button (active, amber) -->
  <rect x="286" y="200" width="86" height="46" rx="7" fill="url(#activePC)"/>
  <text x="329" y="229" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">PC</text>

  <!-- MAC button (inactive) -->
  <rect x="380" y="200" width="88" height="46" rx="7" fill="#0E1929" stroke="#1A2E44"/>
  <text x="424" y="229" text-anchor="middle" font-size="18" fill="#1E3A54">MAC</text>

  <!-- ── MONITOR ROW ── (y=258–298) -->
  <rect x="8" y="258" width="464" height="40" rx="7" fill="url(#cardBg)" stroke="#162840"/>
  <!-- monitor icon -->
  <rect x="15" y="266" width="24" height="17" rx="2" fill="none" stroke="#2A4A6A" stroke-width="1.5"/>
  <rect x="24" y="283" width="6" height="2" rx="1" fill="#2A4A6A"/>
  <rect x="21" y="284" width="12" height="1.5" fill="#2A4A6A"/>
  <text x="52" y="281" font-size="12" fill="#5A8AAA">Monitor</text>
  <!-- PC active -->
  <rect x="286" y="262" width="86" height="32" rx="16" fill="url(#activePC)"/>
  <text x="329" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">PC</text>
  <!-- MAC inactive -->
  <rect x="380" y="262" width="88" height="32" rx="16" fill="#0E1929" stroke="#1E3550"/>
  <text x="424" y="282" text-anchor="middle" font-size="12" fill="#1E3554">MAC</text>

  <!-- ── USB ROW ── (y=306–346) -->
  <rect x="8" y="306" width="464" height="40" rx="7" fill="url(#cardBg)" stroke="#162840"/>
  <line x1="27" y1="316" x2="27" y2="336" stroke="#2A4A6A" stroke-width="1.5"/>
  <polyline points="21,321 27,315 33,321" fill="none" stroke="#2A4A6A" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="21" y="332" width="5" height="4" rx="1" fill="#2A4A6A"/>
  <rect x="28" y="332" width="5" height="4" rx="1" fill="#2A4A6A"/>
  <text x="52" y="329" font-size="12" fill="#5A8AAA">USB</text>
  <!-- PC active -->
  <rect x="286" y="310" width="86" height="32" rx="16" fill="url(#activePC)"/>
  <text x="329" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">PC</text>
  <!-- MAC inactive -->
  <rect x="380" y="310" width="88" height="32" rx="16" fill="#0E1929" stroke="#1E3550"/>
  <text x="424" y="330" text-anchor="middle" font-size="12" fill="#1E3554">MAC</text>

  <!-- ── KVM ROW ── (y=354–394) — MAC active to show mixed state -->
  <rect x="8" y="354" width="464" height="40" rx="7" fill="url(#cardBg)" stroke="#162840"/>
  <rect x="14" y="363" width="28" height="18" rx="2" fill="none" stroke="#2A4A6A" stroke-width="1.5"/>
  <rect x="18" y="367" width="3" height="2.5" rx="0.5" fill="#2A4A6A"/>
  <rect x="24" y="367" width="3" height="2.5" rx="0.5" fill="#2A4A6A"/>
  <rect x="30" y="367" width="3" height="2.5" rx="0.5" fill="#2A4A6A"/>
  <rect x="18" y="372" width="3" height="2.5" rx="0.5" fill="#2A4A6A"/>
  <rect x="24" y="372" width="8" height="2.5" rx="0.5" fill="#2A4A6A"/>
  <text x="52" y="377" font-size="12" fill="#5A8AAA">KVM</text>
  <!-- PC inactive -->
  <rect x="286" y="358" width="86" height="32" rx="16" fill="#0E1929" stroke="#1E3550"/>
  <text x="329" y="378" text-anchor="middle" font-size="12" fill="#1E3554">PC</text>
  <!-- MAC active (teal — different from PC amber, clearly distinct) -->
  <rect x="380" y="358" width="88" height="32" rx="16" fill="url(#activeMAC)"/>
  <text x="424" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">MAC</text>

  <!-- ── SEPARATOR ── -->
  <rect x="8" y="400" width="464" height="1" fill="#1A2E44"/>

  <!-- ── PC MONITOR MODE ── -->
  <text x="20" y="413" font-size="8" fill="#2A4A6A" letter-spacing="2">PC MONITOR MODE</text>

  <!-- Dual Screen -->
  <rect x="8" y="418" width="148" height="26" rx="6" fill="#0C1826" stroke="#1A2E44"/>
  <rect x="34" y="424" width="14" height="11" rx="1" fill="none" stroke="#2A4A6A" stroke-width="1.5"/>
  <rect x="50" y="424" width="14" height="11" rx="1" fill="none" stroke="#2A4A6A" stroke-width="1.5"/>
  <text x="82" y="436" text-anchor="middle" font-size="9" fill="#2A5A7A" letter-spacing="0.5">DUAL</text>

  <!-- OLED -->
  <rect x="164" y="418" width="148" height="26" rx="6" fill="#0C1826" stroke="#1A2E44"/>
  <rect x="212" y="424" width="18" height="11" rx="1" fill="none" stroke="#2A4A6A" stroke-width="1.5"/>
  <text x="238" y="436" text-anchor="middle" font-size="9" fill="#2A5A7A" letter-spacing="0.5">OLED</text>

  <!-- Ultrawide -->
  <rect x="320" y="418" width="152" height="26" rx="6" fill="#0C1826" stroke="#1A2E44"/>
  <rect x="348" y="427" width="30" height="7" rx="1" fill="none" stroke="#2A4A6A" stroke-width="1.5"/>
  <text x="396" y="436" text-anchor="middle" font-size="9" fill="#2A5A7A" letter-spacing="0.5">ULTRAWIDE</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="450" width="480" height="30" fill="#0A1525"/>
  <rect x="0" y="450" width="480" height="1" fill="#1A2E44"/>
  <circle cx="210" cy="465" r="4" fill="#F59E0B"/>
  <circle cx="228" cy="465" r="3" fill="#1A2E44"/>
  <circle cx="246" cy="465" r="3" fill="#1A2E44"/>

  <!-- LABEL -->
  <text x="240" y="478" text-anchor="middle" font-size="9" fill="#2A4A6A" letter-spacing="1">OPTION B — MATRIX / NAVY</text>
</svg>
