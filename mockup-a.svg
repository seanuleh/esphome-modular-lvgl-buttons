<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <style>text { font-family: 'SF Mono', 'Consolas', 'Courier New', monospace; }</style>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8813A"/>
      <stop offset="100%" stop-color="#C05F18"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" fill="#0C0C0C"/>

  <!-- ── HEADER ── -->
  <rect width="480" height="28" fill="#141414"/>
  <rect x="0" y="27" width="480" height="1" fill="#222"/>
  <text x="20" y="19" font-size="12" fill="#777">9:42am</text>
  <text x="240" y="19" text-anchor="middle" font-size="11" fill="#ccc" letter-spacing="3">OFFICE</text>
  <circle cx="452" cy="14" r="5" fill="#4CAF50"/>
  <text x="462" y="19" font-size="10" fill="#4CAF50">HA</text>

  <!-- ── BLINDS SECTION ── -->
  <rect x="0" y="28" width="480" height="62" fill="#0F0F0F"/>
  <!-- venetian blind icon -->
  <rect x="16" y="40" width="22" height="2" rx="1" fill="#555"/>
  <rect x="16" y="46" width="22" height="2" rx="1" fill="#555"/>
  <rect x="16" y="52" width="22" height="2" rx="1" fill="#555"/>
  <rect x="16" y="58" width="22" height="2" rx="1" fill="#555"/>
  <rect x="16" y="64" width="22" height="2" rx="1" fill="#555"/>
  <text x="50" y="60" font-size="12" fill="#888">Blinds</text>
  <!-- slider track -->
  <rect x="112" y="54" width="296" height="5" rx="2.5" fill="#222"/>
  <rect x="112" y="54" width="148" height="5" rx="2.5" fill="#4A4A4A"/>
  <circle cx="260" cy="56" r="9" fill="#666" stroke="#888" stroke-width="1.5"/>
  <!-- open button -->
  <rect x="420" y="46" width="50" height="22" rx="4" fill="#1C1C1C" stroke="#2A2A2A"/>
  <text x="445" y="61" text-anchor="middle" font-size="10" fill="#666">OPEN</text>
  <rect x="0" y="89" width="480" height="1" fill="#1E1E1E"/>

  <!-- ── PC POWER SECTION ── -->
  <rect x="0" y="90" width="480" height="70" fill="#0A0A0A"/>

  <!-- SeanPC power button (on = green) -->
  <circle cx="34" cy="125" r="16" fill="#0F1A0F" stroke="#4CAF50" stroke-width="2"/>
  <line x1="34" y1="109" x2="34" y2="118" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 25 115 A 12 12 0 1 0 43 115" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
  <text x="62" y="120" font-size="12" fill="#ccc">SeanPC</text>
  <text x="62" y="136" font-size="11" fill="#4CAF50">● ON</text>

  <!-- GinaPC power button (off = red) -->
  <circle cx="446" cy="125" r="16" fill="#1A0F0F" stroke="#F44336" stroke-width="2"/>
  <line x1="446" y1="109" x2="446" y2="118" stroke="#F44336" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 437 115 A 12 12 0 1 0 455 115" fill="none" stroke="#F44336" stroke-width="2" stroke-linecap="round"/>
  <text x="395" y="120" font-size="12" fill="#ccc">GinaPC</text>
  <text x="393" y="136" font-size="11" fill="#F44336">● OFF</text>

  <rect x="0" y="160" width="480" height="1" fill="#1E1E1E"/>

  <!-- ══════════════════════════════════ -->
  <!-- ──── MUX / ROUTING SECTION ────── -->
  <!-- ══════════════════════════════════ -->

  <!-- SWITCH ALL master control (y=168–225) -->
  <rect x="8" y="168" width="464" height="56" rx="10" fill="#161616" stroke="#272727"/>
  <text x="20" y="182" font-size="8" fill="#444" letter-spacing="2.5">SWITCH ALL</text>

  <!-- PC half (active) -->
  <rect x="234" y="171" width="113" height="50" rx="8" fill="url(#amberGrad)"/>
  <text x="290" y="204" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff" letter-spacing="1">PC</text>

  <!-- MAC half (inactive) -->
  <rect x="350" y="171" width="115" height="50" rx="8" fill="#111"/>
  <text x="408" y="204" text-anchor="middle" font-size="20" fill="#3A3A3A" letter-spacing="1">MAC</text>

  <!-- divider -->
  <rect x="231" y="175" width="1" height="42" fill="#272727"/>

  <!-- mixed state hint -->
  <text x="22" y="213" font-size="9" fill="#3D3D3D">2 of 3 → PC  ·  KVM → MAC</text>

  <!-- ── DEVICE ROWS ── -->

  <!-- Monitor row (y=232–272) -->
  <rect x="8" y="232" width="464" height="40" rx="7" fill="#111111"/>
  <!-- monitor icon -->
  <rect x="16" y="240" width="24" height="17" rx="2" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>
  <rect x="25" y="257" width="6" height="3" rx="1" fill="#4A4A4A"/>
  <rect x="22" y="259" width="12" height="1.5" rx="0.5" fill="#4A4A4A"/>
  <text x="52" y="255" font-size="12" fill="#777">Monitor</text>
  <!-- PC active pill -->
  <rect x="288" y="236" width="78" height="30" rx="15" fill="url(#amberGrad)"/>
  <text x="327" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">PC</text>
  <!-- MAC inactive pill -->
  <rect x="374" y="236" width="90" height="30" rx="15" fill="#191919" stroke="#252525"/>
  <text x="419" y="255" text-anchor="middle" font-size="12" fill="#333">MAC</text>

  <!-- USB row (y=280–320) -->
  <rect x="8" y="280" width="464" height="40" rx="7" fill="#111111"/>
  <!-- USB icon -->
  <line x1="28" y1="290" x2="28" y2="310" stroke="#4A4A4A" stroke-width="1.5"/>
  <polyline points="22,296 28,290 34,296" fill="none" stroke="#4A4A4A" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="22" y="306" width="5" height="4" rx="1" fill="#4A4A4A"/>
  <rect x="29" y="306" width="5" height="4" rx="1" fill="#4A4A4A"/>
  <text x="52" y="303" font-size="12" fill="#777">USB</text>
  <!-- PC active pill -->
  <rect x="288" y="284" width="78" height="30" rx="15" fill="url(#amberGrad)"/>
  <text x="327" y="303" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">PC</text>
  <!-- MAC inactive pill -->
  <rect x="374" y="284" width="90" height="30" rx="15" fill="#191919" stroke="#252525"/>
  <text x="419" y="303" text-anchor="middle" font-size="12" fill="#333">MAC</text>

  <!-- KVM row (y=328–368) -->
  <rect x="8" y="328" width="464" height="40" rx="7" fill="#111111"/>
  <!-- keyboard icon -->
  <rect x="15" y="337" width="28" height="18" rx="2" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>
  <rect x="19" y="341" width="3" height="3" rx="0.5" fill="#4A4A4A"/>
  <rect x="25" y="341" width="3" height="3" rx="0.5" fill="#4A4A4A"/>
  <rect x="31" y="341" width="3" height="3" rx="0.5" fill="#4A4A4A"/>
  <rect x="19" y="347" width="3" height="3" rx="0.5" fill="#4A4A4A"/>
  <rect x="25" y="347" width="8" height="3" rx="0.5" fill="#4A4A4A"/>
  <rect x="35" y="347" width="3" height="3" rx="0.5" fill="#4A4A4A"/>
  <text x="52" y="351" font-size="12" fill="#777">KVM</text>
  <!-- PC inactive pill -->
  <rect x="288" y="332" width="78" height="30" rx="15" fill="#191919" stroke="#252525"/>
  <text x="327" y="351" text-anchor="middle" font-size="12" fill="#333">PC</text>
  <!-- MAC active pill (blue — shows split state) -->
  <rect x="374" y="332" width="90" height="30" rx="15" fill="url(#blueGrad)"/>
  <text x="419" y="351" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">MAC</text>

  <!-- ── SEPARATOR ── -->
  <rect x="8" y="374" width="464" height="1" fill="#1E1E1E"/>

  <!-- ── PC MONITOR MODE ── -->
  <text x="20" y="387" font-size="8" fill="#3A3A3A" letter-spacing="2">PC MONITOR MODE</text>

  <!-- Dual Screen button -->
  <rect x="8" y="392" width="148" height="52" rx="7" fill="#141414" stroke="#232323"/>
  <rect x="36" y="403" width="18" height="14" rx="1.5" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>
  <rect x="56" y="403" width="18" height="14" rx="1.5" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>
  <text x="82" y="436" text-anchor="middle" font-size="9" fill="#4A4A4A" letter-spacing="1">DUAL</text>

  <!-- OLED button -->
  <rect x="164" y="392" width="148" height="52" rx="7" fill="#141414" stroke="#232323"/>
  <rect x="212" y="403" width="24" height="14" rx="1.5" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>
  <text x="238" y="436" text-anchor="middle" font-size="9" fill="#4A4A4A" letter-spacing="1">OLED</text>

  <!-- Ultrawide button -->
  <rect x="320" y="392" width="152" height="52" rx="7" fill="#141414" stroke="#232323"/>
  <rect x="349" y="406" width="34" height="9" rx="1" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>
  <text x="396" y="436" text-anchor="middle" font-size="9" fill="#4A4A4A" letter-spacing="1">ULTRAWIDE</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="450" width="480" height="30" fill="#0A0A0A"/>
  <rect x="0" y="450" width="480" height="1" fill="#1A1A1A"/>
  <!-- page nav dots -->
  <circle cx="210" cy="465" r="4" fill="#E8813A"/>
  <circle cx="228" cy="465" r="3" fill="#2A2A2A"/>
  <circle cx="246" cy="465" r="3" fill="#2A2A2A"/>

  <!-- LABEL -->
  <text x="240" y="478" text-anchor="middle" font-size="9" fill="#333" letter-spacing="1">OPTION A — PILL TOGGLES</text>
</svg>
