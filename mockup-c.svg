<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
<defs>
  <style>text { font-family: 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', sans-serif; }</style>

  <!-- Neutral charcoal — subtle center glow like the reference but no warmth -->
  <radialGradient id="bg" cx="50%" cy="40%" r="70%">
    <stop offset="0%" stop-color="#1E1E1E"/>
    <stop offset="100%" stop-color="#0A0A0A"/>
  </radialGradient>

  <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#262626"/>
    <stop offset="100%" stop-color="#1A1A1A"/>
  </linearGradient>

  <!-- PC = clean red (accent) -->
  <linearGradient id="pcG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#D42A2A"/>
    <stop offset="100%" stop-color="#A01E1E"/>
  </linearGradient>

  <!-- MAC = cool indigo -->
  <linearGradient id="macG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4A6ADA"/>
    <stop offset="100%" stop-color="#3050B0"/>
  </linearGradient>

  <!-- Blind slider fill — neutral grey -->
  <linearGradient id="blindTrack" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#606060"/>
    <stop offset="100%" stop-color="#3A3A3A"/>
  </linearGradient>

  <!-- Jiggler active green -->
  <linearGradient id="jigG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#22C55E"/>
    <stop offset="100%" stop-color="#16A04A"/>
  </linearGradient>

  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ══════════════════════════════════════ -->
<!-- BACKGROUND -->
<!-- ══════════════════════════════════════ -->
<rect width="480" height="480" fill="url(#bg)"/>

<!-- ══════════════════════════════════════ -->
<!-- HEADER  y=0–30 -->
<!-- ══════════════════════════════════════ -->
<rect width="480" height="30" fill="#111111"/>
<rect x="0" y="29" width="480" height="1" fill="#2A2A2A"/>

<!-- Time: hour white, colon+minute in red (direct reference lift) -->
<text x="16" y="22" font-size="17" font-weight="700" fill="#F0F0F0">9</text>
<text x="30" y="22" font-size="17" font-weight="700" fill="#CC2828">:42</text>
<text x="68" y="21" font-size="10" fill="#444444">am</text>

<text x="240" y="21" text-anchor="middle" font-size="11" fill="#555555" letter-spacing="4">OFFICE</text>

<circle cx="452" cy="15" r="5" fill="#22C55E" filter="url(#glow)"/>
<text x="463" y="20" font-size="9" fill="#22C55E">HA</text>


<!-- ══════════════════════════════════════ -->
<!-- PC POWER ROW  y=30–92 -->
<!-- ══════════════════════════════════════ -->
<rect x="0" y="30" width="480" height="62" fill="#111111"/>

<!-- SeanPC card -->
<rect x="10" y="38" width="150" height="46" rx="12" fill="url(#cardG)" stroke="#303030" stroke-width="1"/>
<circle cx="36" cy="61" r="14" fill="#0E1A0E" stroke="#22C55E" stroke-width="1.8"/>
<line x1="36" y1="48" x2="36" y2="56" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
<path d="M28,54 A11,11 0 1,0 44,54" fill="none" stroke="#22C55E" stroke-width="1.8" stroke-linecap="round"/>
<text x="58" y="57" font-size="12" fill="#CCCCCC">SeanPC</text>
<text x="58" y="73" font-size="10" fill="#22C55E">● ON</text>

<!-- GinaPC card -->
<rect x="320" y="38" width="150" height="46" rx="12" fill="url(#cardG)" stroke="#303030" stroke-width="1"/>
<circle cx="346" cy="61" r="14" fill="#1A1010" stroke="#D42A2A" stroke-width="1.8"/>
<line x1="346" y1="48" x2="346" y2="56" stroke="#D42A2A" stroke-width="2" stroke-linecap="round"/>
<path d="M338,54 A11,11 0 1,0 354,54" fill="none" stroke="#D42A2A" stroke-width="1.8" stroke-linecap="round"/>
<text x="368" y="57" font-size="12" fill="#CCCCCC">GinaPC</text>
<text x="368" y="73" font-size="10" fill="#888888">● OFF</text>

<rect x="0" y="92" width="480" height="1" fill="#2A2A2A"/>


<!-- ══════════════════════════════════════ -->
<!-- BLINDS  y=93–160 -->
<!-- ══════════════════════════════════════ -->
<rect x="0" y="93" width="480" height="67" fill="#111111"/>

<!-- Venetian slat icon -->
<rect x="12" y="100" width="30" height="2.5" rx="1.2" fill="#333333"/>
<rect x="12" y="107" width="30" height="2.5" rx="1.2" fill="#333333"/>
<rect x="12" y="114" width="30" height="2.5" rx="1.2" fill="#333333"/>
<rect x="12" y="121" width="30" height="2.5" rx="1.2" fill="#333333"/>
<rect x="12" y="128" width="30" height="2.5" rx="1.2" fill="#333333"/>
<line x1="18" y1="99" x2="18" y2="145" stroke="#282828" stroke-width="0.8"/>
<line x1="36" y1="99" x2="36" y2="145" stroke="#282828" stroke-width="0.8"/>

<text x="54" y="118" font-size="9" fill="#3A3A3A" letter-spacing="2">BLINDS</text>

<!-- Slider track -->
<rect x="54" y="130" width="360" height="4" rx="2" fill="#161616" stroke="#2A2A2A" stroke-width="0.5"/>
<!-- Fill (45%) -->
<rect x="54" y="130" width="162" height="4" rx="2" fill="url(#blindTrack)"/>
<!-- Tick marks -->
<line x1="54"  y1="137" x2="54"  y2="142" stroke="#2E2E2E" stroke-width="1"/>
<line x1="144" y1="137" x2="144" y2="142" stroke="#2E2E2E" stroke-width="1"/>
<line x1="234" y1="137" x2="234" y2="142" stroke="#2E2E2E" stroke-width="1"/>
<line x1="324" y1="137" x2="324" y2="142" stroke="#2E2E2E" stroke-width="1"/>
<line x1="414" y1="137" x2="414" y2="142" stroke="#2E2E2E" stroke-width="1"/>

<!-- Pill handle -->
<rect x="204" y="124" width="30" height="20" rx="10" fill="#4A4A4A" stroke="#6A6A6A" stroke-width="1.5"/>
<line x1="213" y1="130" x2="225" y2="130" stroke="#6A6A6A" stroke-width="1.2" stroke-linecap="round"/>
<line x1="213" y1="134" x2="225" y2="134" stroke="#6A6A6A" stroke-width="1.2" stroke-linecap="round"/>
<line x1="213" y1="138" x2="225" y2="138" stroke="#6A6A6A" stroke-width="1.2" stroke-linecap="round"/>

<text x="424" y="132" font-size="11" fill="#555555">45%</text>
<rect x="424" y="138" width="50" height="18" rx="5" fill="#181818" stroke="#2A2A2A"/>
<text x="449" y="150" text-anchor="middle" font-size="9" fill="#555555">CLOSE</text>

<rect x="0" y="160" width="480" height="1" fill="#2A2A2A"/>


<!-- ══════════════════════════════════════════════ -->
<!-- MUX TOGGLE CARDS  y=168–284 -->
<!-- ══════════════════════════════════════════════ -->

<text x="16" y="182" font-size="9" fill="#3A3A3A" letter-spacing="2">INPUT ROUTING  ·  tap to toggle</text>

<!-- Card 1: MONITOR — PC (red accent top) -->
<rect x="8"   y="188" width="146" height="96" rx="14" fill="url(#cardG)" stroke="#303030" stroke-width="1"/>
<rect x="8"   y="188" width="146" height="3"  rx="2"  fill="#CC2828"/>
<circle cx="81" cy="224" r="22" fill="#181818" stroke="#2E2E2E" stroke-width="1"/>
<rect  x="68" y="215" width="26" height="17" rx="2" fill="none" stroke="#E0E0E0" stroke-width="1.8"/>
<rect  x="77" y="232" width="8"  height="2"  rx="1" fill="#E0E0E0"/>
<rect  x="74" y="233" width="14" height="1.5"      fill="#E0E0E0"/>
<text x="81" y="254" text-anchor="middle" font-size="9" fill="#666666" letter-spacing="1.5">MONITOR</text>
<rect x="48" y="260" width="66" height="20" rx="10" fill="url(#pcG)"/>
<text x="81" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">PC</text>

<!-- Card 2: USB — PC (red accent top) -->
<rect x="167" y="188" width="146" height="96" rx="14" fill="url(#cardG)" stroke="#303030" stroke-width="1"/>
<rect x="167" y="188" width="146" height="3"  rx="2"  fill="#CC2828"/>
<circle cx="240" cy="224" r="22" fill="#181818" stroke="#2E2E2E" stroke-width="1"/>
<line x1="240" y1="212" x2="240" y2="233" stroke="#E0E0E0" stroke-width="1.8"/>
<polyline points="233,218 240,211 247,218" fill="none" stroke="#E0E0E0" stroke-width="1.8" stroke-linejoin="round"/>
<rect x="233" y="228" width="5" height="4" rx="1" fill="#E0E0E0"/>
<rect x="242" y="228" width="5" height="4" rx="1" fill="#E0E0E0"/>
<text x="240" y="254" text-anchor="middle" font-size="9" fill="#666666" letter-spacing="1.5">USB</text>
<rect x="207" y="260" width="66" height="20" rx="10" fill="url(#pcG)"/>
<text x="240" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">PC</text>

<!-- Card 3: KVM — MAC (indigo accent top) -->
<rect x="326" y="188" width="146" height="96" rx="14" fill="url(#cardG)" stroke="#303030" stroke-width="1"/>
<rect x="326" y="188" width="146" height="3"  rx="2"  fill="#4A6ADA"/>
<circle cx="399" cy="224" r="22" fill="#181818" stroke="#2E2E2E" stroke-width="1"/>
<rect x="383" y="215" width="32" height="20" rx="2" fill="none" stroke="#E0E0E0" stroke-width="1.8"/>
<rect x="387" y="219" width="3" height="3" rx="0.5" fill="#E0E0E0"/>
<rect x="393" y="219" width="3" height="3" rx="0.5" fill="#E0E0E0"/>
<rect x="399" y="219" width="3" height="3" rx="0.5" fill="#E0E0E0"/>
<rect x="405" y="219" width="3" height="3" rx="0.5" fill="#E0E0E0"/>
<rect x="387" y="226" width="3" height="3" rx="0.5" fill="#E0E0E0"/>
<rect x="393" y="226" width="12" height="3" rx="0.5" fill="#E0E0E0"/>
<rect x="408" y="226" width="3" height="3" rx="0.5" fill="#E0E0E0"/>
<text x="399" y="254" text-anchor="middle" font-size="9" fill="#666666" letter-spacing="1.5">KVM</text>
<rect x="365" y="260" width="68" height="20" rx="10" fill="url(#macG)"/>
<text x="399" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">MAC</text>


<!-- ══════════════════════════════════════════════ -->
<!-- MASTER SWITCH PILLS  y=296–352 -->
<!-- ══════════════════════════════════════════════ -->

<!-- ALL → PC (filled red) -->
<rect x="8"   y="296" width="228" height="50" rx="25" fill="url(#pcG)"/>
<text x="122" y="327" text-anchor="middle" font-size="16" font-weight="700" fill="#fff" letter-spacing="0.5">ALL  →  PC</text>

<!-- ALL → MAC (outlined indigo) -->
<rect x="244" y="296" width="228" height="50" rx="25" fill="#111111" stroke="#4A6ADA" stroke-width="1.5"/>
<text x="358" y="327" text-anchor="middle" font-size="16" fill="#4A6ADA" letter-spacing="0.5">ALL  →  MAC</text>


<!-- ══════════════════════════════════════════════ -->
<!-- BOTTOM ROW: DISPLAY MODE + JIGGLER  y=360–414 -->
<!-- ══════════════════════════════════════════════ -->

<text x="16"  y="372" font-size="9" fill="#3A3A3A" letter-spacing="2">DISPLAY</text>
<text x="308" y="372" font-size="9" fill="#3A3A3A" letter-spacing="2">JIGGLER</text>

<!-- Dual Screen -->
<rect x="8"   y="378" width="88" height="36" rx="9" fill="url(#cardG)" stroke="#303030"/>
<rect x="22" y="386" width="14" height="10" rx="1.5" fill="none" stroke="#555555" stroke-width="1.5"/>
<rect x="38" y="386" width="14" height="10" rx="1.5" fill="none" stroke="#555555" stroke-width="1.5"/>
<text x="52" y="408" text-anchor="middle" font-size="8" fill="#555555" letter-spacing="0.5">DUAL</text>

<!-- OLED -->
<rect x="104" y="378" width="88" height="36" rx="9" fill="url(#cardG)" stroke="#303030"/>
<rect x="132" y="386" width="18" height="10" rx="1.5" fill="none" stroke="#555555" stroke-width="1.5"/>
<text x="148" y="408" text-anchor="middle" font-size="8" fill="#555555" letter-spacing="0.5">OLED</text>

<!-- Ultrawide -->
<rect x="200" y="378" width="88" height="36" rx="9" fill="url(#cardG)" stroke="#303030"/>
<rect x="214" y="389" width="30" height="7" rx="1" fill="none" stroke="#555555" stroke-width="1.5"/>
<text x="244" y="408" text-anchor="middle" font-size="8" fill="#555555" letter-spacing="0.5">ULTRA</text>

<!-- Mouse Jiggler toggle (OFF state) -->
<rect x="304" y="378" width="168" height="36" rx="18" fill="url(#cardG)" stroke="#303030"/>
<!-- Mouse icon -->
<rect x="316" y="384" width="14" height="18" rx="6" fill="none" stroke="#555555" stroke-width="1.5"/>
<line x1="323" y1="384" x2="323" y2="393" stroke="#555555" stroke-width="1"/>
<!-- Toggle track (off) -->
<rect x="340" y="389" width="46" height="14" rx="7" fill="#161616" stroke="#2A2A2A"/>
<circle cx="349" cy="396" r="8" fill="#383838" stroke="#505050" stroke-width="1"/>
<text x="400" y="400" font-size="12" fill="#444444" font-weight="700">OFF</text>


<!-- ══════════════════════════════════════ -->
<!-- FOOTER  y=450–480 -->
<!-- ══════════════════════════════════════ -->
<rect x="0" y="450" width="480" height="30" fill="#0A0A0A"/>
<rect x="0" y="450" width="480" height="1" fill="#222222"/>
<circle cx="222" cy="465" r="4"   fill="#CC2828"/>
<circle cx="238" cy="465" r="2.5" fill="#2A2A2A"/>
<circle cx="252" cy="465" r="2.5" fill="#2A2A2A"/>
</svg>
