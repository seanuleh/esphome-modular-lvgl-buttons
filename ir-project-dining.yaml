esphome:
  name: "ir-project-dining"

esp8266:
  board: esp12e

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

logger:
  level: VERBOSE

api:

ota:
  platform: esphome

# This part listens for incoming IR codes
remote_receiver:
  pin:
    number: GPIO14
    inverted: true
  dump: all

# This part allows you to send IR codes later
remote_transmitter:
  id: tx
  pin: GPIO4
  carrier_duty_percent: 50%

# Fujitsu ASTA30LCC — AR-RAH2E remote protocol
climate:
  - platform: fujitsu_general
    name: "Aircon"
    id: aircon
    transmitter_id: tx